# Global defaults applied to every enabled protocol unless overridden below.
global:
  # CAN interface/backend selector. Examples: "can0" (SocketCAN), "pcan:PCAN_USBBUS1" (PCAN).
  interface: pcan:PCAN_USBBUS1
  # Sending mode: 1 = max speed, 0 = explicit timer-based pacing in the shared send loop.
  rate_mode: 1
  # Source addressing mode. "rand" means randomized source behavior where applicable.
  source_mode: rand
  # Generic destination. Protocols may reinterpret this (e.g., SDO RX COB-ID fallback for CANopen).
  destination: rand
  # Number of primary frames generated per enabled protocol run.
  packet_count: 1000000
  # Print progress every N generated frames.
  print_interval: 10000
  # RNG seed for reproducible fuzz runs.
  seed: 1337
  # Probability (0..1) that each mutation in a mutation_chain is applied.
  mutation_rate: 0.85
  # Optional run summary output (aggregate for YAML runs).
  summary_enabled: true
  # Path for summary JSON when summary_enabled=true.
  summary_file: ./replay/casic_indepth_summary.json
  # Optional profile label added to replay metadata.
  profile_name: indepth

# Per-protocol sections. Set enabled=false to skip that protocol entirely.
protocols:
  cansic:
    # Enable/disable raw CAN fuzzing section.
    enabled: true
    # Allow CAN-FD frame generation for this section.
    can_fd: true
    # Single fallback mutation mode when no mutation_chain is provided.
    mutation: structured
    # Ordered chain of mutations applied to payloads.
    mutation_chain: bitflip,nibbleflip,byteflip,boundary,swap,arithmetic,truncate,expand,structured
    # Minimum random payload length (bytes).
    payload_min_len: 0
    # Maximum random payload length (bytes); capped by protocol frame limits.
    payload_max_len: 64
    # Probability (0..1) to use 29-bit extended CAN ID.
    raw_extended_id_probability: 0.8
    # Probability (0..1) to emit CAN-FD frames (in addition to can_fd setting).
    raw_fd_probability: 0.95
    # Probability (0..1) to tag frame as error-injection request (backend dependent).
    raw_error_injection_probability: 0.15
    # Output file for replay capture of sent frames.
    save_replay_file: ./replay/cansic_indepth.jsonl

  udsic:
    # Enable/disable UDS fuzzing section.
    enabled: true
    # UDS request arbitration ID (tester -> ECU).
    uds_request_id: 0x7E0
    # Expected UDS response arbitration ID filter (ECU -> tester).
    uds_response_id: 0x7E8
    # Probability (0..1) to force invalid/unusual UDS service IDs.
    uds_invalid_sid_probability: 0.25
    # Probability (0..1) to corrupt ISO-TP PCI bytes.
    uds_malformed_pci_probability: 0.2
    # Probability (0..1) to prefer stateful UDS service progression.
    uds_sequence_awareness_probability: 0.95
    # Probability (0..1) to adapt requests after negative responses (NRC-aware).
    uds_negative_response_awareness_probability: 0.9
    # Probability (0..1) to adapt UDS services based on prior response outcomes.
    uds_adaptive_sequence_probability: 0.9
    # Probability (0..1) of explicit backoff branch after NRC responses.
    uds_nrc_backoff_probability: 0.45
    # Probability (0..1) of advertising a wrong single-frame payload length.
    uds_single_frame_length_mismatch_probability: 0.25
    # Probability (0..1) of advertising a wrong first-frame total length.
    uds_first_frame_length_mismatch_probability: 0.25
    # Probability (0..1) of injecting consecutive-frame sequence anomalies.
    uds_consecutive_frame_sequence_anomaly_probability: 0.3
    # Probability (0..1) of probing recovery paths after prior state/NRC outcomes.
    uds_recovery_probe_probability: 0.45
    # Maximum application payload length before ISO-TP segmentation.
    uds_max_payload_len: 512
    # Optional request-response correlation report.
    correlation_enabled: true
    # Output CSV path for UDS correlation report.
    correlation_report_file: ./replay/udsic_indepth_correlation.csv
    # Request-response match window in seconds.
    correlation_window_seconds: 2.0
    # Output file for replay capture of sent UDS frames.
    save_replay_file: ./replay/udsic_indepth.jsonl

  j1939sic:
    # Enable/disable J1939 fuzzing section.
    enabled: true
    # J1939 priority (0 highest .. 7 lowest).
    j1939_priority: 0
    # J1939 PGN base value for generation.
    j1939_pgn: 0xFEF2
    # J1939 source address.
    j1939_sa: 0x80
    # J1939 destination address.
    j1939_da: 0xFE
    # Probability (0..1) to generate transport-protocol-like traffic patterns.
    j1939_tp_probability: 0.9
    # Probability (0..1) to use boundary/invalid-ish PGN variants.
    j1939_invalid_pgn_probability: 0.25
    # Probability (0..1) of TP DT sequence anomalies (gap/duplicate/reorder).
    j1939_tp_sequence_anomaly_probability: 0.35
    # Probability (0..1) of TP timing fault metadata injection.
    j1939_tp_timing_fault_probability: 0.25
    # Probability (0..1) of truncating TP DT bursts before completion.
    j1939_tp_incomplete_dt_probability: 0.25
    # Probability (0..1) of DT/CM ordering faults in TP traffic.
    j1939_tp_cm_dt_order_fault_probability: 0.18
    # Probability (0..1) of advertising a TP packet count mismatch.
    j1939_tp_packet_count_mismatch_probability: 0.22
    # Optional request-response correlation report.
    correlation_enabled: true
    # Output CSV path for J1939 correlation report.
    correlation_report_file: ./replay/j1939sic_indepth_correlation.csv
    # Request-response match window in seconds.
    correlation_window_seconds: 2.0
    # Output file for replay capture of sent J1939 frames.
    save_replay_file: ./replay/j1939sic_indepth.jsonl

  cosic:
    # Enable/disable CANopen fuzzing section.
    enabled: true
    # CANopen node ID used for deriving standard COB-IDs when overrides are not set.
    node_id: 0x61
    # Explicit SDO client->server COB-ID override.
    sdo_rx_cobid: 0x661
    # Explicit SDO server->client COB-ID override.
    sdo_tx_cobid: 0x5E1
    # Explicit TPDO1 COB-ID override.
    tpdo1_cobid: 0x1E1
    # Explicit RPDO1 COB-ID override.
    rpdo1_cobid: 0x261
    # Probability (0..1) to corrupt SDO command/subindex fields.
    canopen_invalid_sdo_probability: 0.4
    # Probability (0..1) to adapt SDO targeting based on observed abort codes.
    canopen_abort_aware_probability: 0.9
    # Frames to avoid recently aborted object entries.
    canopen_abort_blacklist_window: 24
    # Probability (0..1) of preferring NMT state-aware control transitions.
    canopen_nmt_state_aware_probability: 0.8
    # Probability (0..1) of generating segmented CANopen SDO download transfers.
    canopen_segmented_sdo_probability: 0.75
    # Probability (0..1) of preferring entries within parser-derived array/subindex bounds.
    canopen_array_bounds_aware_probability: 0.85
    # Frame-family bias: balanced | sdo-heavy | pdo-heavy | control-heavy.
    canopen_mode_bias: sdo-heavy
    # CANopen EDS file used to load object dictionary and mapping metadata.
    eds: ./casic/examples/node.eds
    # Output file for replay capture of sent CANopen frames.
    save_replay_file: ./replay/cosic_indepth.jsonl
